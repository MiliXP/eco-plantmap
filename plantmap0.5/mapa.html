<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantMapa</title>

    <!-- CSS BASE -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- CSS DO MAPA -->
    <link rel="stylesheet" href="CSS/mapa.css">

    <style>
        /* =========================
           BOTÃO VOLTAR */

        #btnVoltar {
            position: fixed;
            top: 20px;
            right: 20px;

            background: linear-gradient(135deg, #1b7925, #405138);
            color: white;

            border: none;
            border-radius: 30px;

            padding: 12px 20px;
            cursor: pointer;
            font-weight: 500;

            display: flex;
            align-items: center;
            gap: 8px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* =========================
           BOTÃO DARK MODE */

        #toggleDark {
            position: fixed;
            top: 20px;
            right: 00px;

            background: #333;
            color: white;

            border: none;
            border-radius: 50%;

            width: 45px;
            height: 45px;

            cursor: pointer;
            font-size: 18px;

            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* =========================
           MOBILE */

        @media (max-width: 600px) {

            /* VOLTAR vira bolinha */
            #btnVoltar {
                width: 55px;
                height: 55px;

                padding: 0;
                border-radius: 50%;

                justify-content: center;
            }

            /* esconde texto */
            #btnVoltar .texto {
                display: none;
            }

            /* mantém só a seta */
            #btnVoltar .icone {
                font-size: 20px;
            }

            /* DARK MODE ajusta posição */
            #toggleDark {
                right: 20px;
                top: 90px;
            }
        }
    </style>
</head>

<body>

    <!-- BOTÃO VOLTAR -->
    <button id="btnVoltar">
        <span class="icone">⬅</span>
        <span class="texto">Ir para o Ranking</span>
    </button>

    <!-- BOTÃO DARK MODE -->
    <button id="toggleDark">🌙</button>

    <div class="container">

        <!-- HEADER DO SISTEMA -->
        <header>
            <h1><span>Plant</span>Map</h1>
            <p>Visualização das áreas de plantio</p>
        </header>

        <!-- MAPA -->
        <section class="mapa-container">

            <div class="mapa-card">

                <div class="mapa-header">
                    <h2>🌍 Mapa de Plantio</h2>
                    <p>Acompanhe as regiões com maior número de mudas plantadas</p>
                </div>

                <div id="mapa">
                    MAPA AQUI
                </div>

                <div class="mapa-info">
                    <div class="info-box">
                        <span>🌱 Total</span>
                        <strong>14.852</strong>
                    </div>

                    <div class="info-box">
                        <span>🌳 Área</span>
                        <strong>1200 m²</strong>
                    </div>

                    <div class="info-box">
                        <span>👥 Participantes</span>
                        <strong>84</strong>
                    </div>
                </div>

            </div>

        </section>

    </div>

    <!-- SCRIPT -->
    <script>
        document.getElementById("btnVoltar").addEventListener("click", function() {
            window.location.href = "index.html";
        });

        const toggle = document.getElementById("toggleDark");

        toggle.addEventListener("click", function() {
            document.body.classList.toggle("dark");
        });
    </script>

</body>
</html>
