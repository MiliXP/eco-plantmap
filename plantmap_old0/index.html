<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Vegetal | Morgano Dev</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/490/490333.png">
</head>
<body>

    <nav class="navbar">
        <div class="menu-icon"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#">PROJETOS</a></li>
            <li><a href="#">SOBRE</a></li>
            <li><a href="#">CONTATO</a></li>
        </ul>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-user-circle"></i>
        </div>
    </nav>

    <main class="container">
        
        <section class="sidebar">
            <div class="logo-section">
                <i class="fas fa-tree logo-icon"></i>
                <h1>CATÁLOGO <br> <span>VEGETAL</span></h1>
            </div>

            <div class="category-menu">
                <div class="menu-item active">
                    <i class="fas fa-leaf"></i> 
                    <span>Tipo de Árvores</span>
                </div>
                
                <div class="submenu">
                    <button class="submenu-item" onclick="updateCounter(120)">
                        <span><i class="fas fa-apple-alt"></i> Frutífera</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <button class="submenu-item" onclick="updateCounter(85)">
                        <span><i class="fas fa-seedling"></i> Não Frutífera</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="display-card">
            <div class="stat-card">
                <div class="card-header">
                    <i class="fas fa-spa"></i>
                    <h2>ÁRVORES <br> PLANTADAS</h2>
                </div>
                
                <div class="counter" id="tree-counter">4,875</div>
                
                <p>Total de Árvores Plantadas</p>
                
                <div class="card-decoration">
                    <i class="fas fa-seedling"></i>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
